<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>List Status</title>
</head>
<body>
  <h2>Danh sách trạng thái</h2>
  <table border="1" style="width:100%; border-collapse: collapse;">
    <thead>
      <tr>
        <th rowspan="2">HỌ VÀ TÊN</th>
        <th colspan="6">CÁC THUỘC TÍNH TRẠNG THÁI</th>
      </tr>
      <tr>
        <th>Index</th>
        <th>Count</th>
        <th>First</th>
        <th>Last</th>
        <th>Odd</th>
        <th>Even</th>
      </tr>
    </thead>
    <tbody>
      <th:block th:each="staff, st : ${list}">
        <!-- tô nền theo st.odd -->
        <tr th:style="@{|background-color:${st.odd?'pink':'cyan'}|}">
          <td th:text="${#strings.capitalizeWords(staff.fullname)}"></td>
          <td th:text="${st.index}"></td>   <!-- bắt đầu từ 0 -->
          <td th:text="${st.count}"></td>   <!-- bắt đầu từ 1 -->
          <td th:text="${st.first}"></td>
          <td th:text="${st.last}"></td>
          <td th:text="${st.odd}"></td>
          <td th:text="${st.even}"></td>
        </tr>
      </th:block>
    </tbody>
  </table>
</body>
</html>
